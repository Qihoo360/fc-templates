edition: 3.0.0
name: pandas-ai-server-app
access: '{{ access }}'
vars:
  region: '{{ region }}'
resources:
  framework:
    component: fc
    props:
      region: ${vars.region}
      description: Serverless pandas-ai-server
      runtime: custom
      memorySize: 10240
      cpu: 8
      diskSize: 512
      timeout: 100
      instanceConcurrency: 100
      port: 8080
      functionName: '{{ functionName }}'
      code: pandas-ai-server
      requestType: http
      runtimeType: customize
      cloudBuildType: Dockerfile
      environmentVariables:
        testkey: testvalue
      logConfig:
        isOpen: true
      triggers:
        - triggerName: httptrigger
          triggerType: http
          disableURLInternet: true
          funcVersion: LATEST
          triggerConfig: "{\"auth_type\":\"None\",\"methods\":[\"GET\",\"POST\",\"PUT\",\"DELETE\",\"OPTIONS\",\"HEAD\",\"PATCH\"],\"disable_url_internet\":true,\"auth_config\":\"\"}"
  fc_domain_0:
    component: fc-domain
    props:
      region: '{{ region }}'
      domainName: pandas-ai-server-apptest.test-1-vpc.fc.zyunapp.com
      protocol: http
      routeConfig:
        routes:
          - path: /*
            functionName: '{{ functionName }}'
            methods: ""
            funcVersion: LATEST
        cert:
        isForceHttps: false
      domainAuthConfig:
        authType: "None"
        authConfig: ""
      internetConfig:
        disableUrlInternet: true
      tls:
        maxVersion: ""
      waf:
        enableWaf: false
