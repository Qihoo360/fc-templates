edition: 3.0.0
name: pandas-ai-client-app
access: '{{ access }}'
vars:
  region: '{{ region }}'
resources:
  framework:
    component: fc
    props:
      region: ${vars.region}
      description: Serverless pandas-ai-client
      runtime: custom
      memorySize: 10240
      cpu: 8
      diskSize: 512
      timeout: 100
      instanceConcurrency: 100
      customRuntimeConfig:
        port: 8080
      functionName: '{{ functionName }}'
      code: ./pandas-ai-client
      environmentVariables:
        - testkey: testvalue
      logConfig: auto
      triggers:
        - triggerName: httpTrigger
          triggerType: http
          disableURLInternet: true
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - HEAD
              - OPTIONS
