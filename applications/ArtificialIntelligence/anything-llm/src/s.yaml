edition: 3.0.0
name: anything-llm-app
access: '{{ access }}'
vars:
  region: '{{ region }}'
resources:
  framework:
    component: fc
    props:
      region: '{{ region }}'
      description: Serverless anything-llm
      runtime: custom
      memorySize: 10240
      cpu: 8
      diskSize: 512
      timeout: 100
      instanceConcurrency: 100
      requestType: http
      runtimeType: customize
      cloudBuildType: Dockerfile
      port: 8080
      functionName: '{{ functionName }}'
      code: anything-llm
      environmentVariables:
        testkey: testvalue
      logConfig:
        isOpen: true
      triggers:
        - triggerName: httptrigger
          triggerType: http
          disableURLInternet: true
          funcVersion: LATEST
          triggerConfig: "{\"auth_type\":\"None\",\"methods\":[\"GET\",\"POST\",\"PUT\",\"DELETE\",\"OPTIONS\",\"HEAD\",\"PATCH\"],\"disable_url_internet\":true,\"auth_config\":\"\"}"
  fc_domain_0:
    component: fc-domain
    props:
      region: '{{ region }}'
      domainName: anything-llm-apptest.test-3-vpc.fc.zyunapp.com
      protocol: http
      routes:
        - path: /*
          functionName: '{{ functionName }}'
          methods: ""
          funcVersion: LATEST
      cert:
        isForceHttps: false
      domainAuthConfig:
        authType: "None"
        authConfig: ""
      internetConfig:
        disableUrlInternet: true
      tls:
        maxVersion: ""
      waf:
        enableWaf: false


