edition: 3.0.0
name: flowise-app
access: "{{ access }}"
vars:
  region: "{{ region }}"
resources:
  framework:
    component: fc
    props:
      region: "{{ region }}"
      description: "{{ description }}"
      runtime: custom
      memorySize: 512
      cpu: 0.05
      diskSize: 512
      timeout: 100
      instanceConcurrency: 1
      port: 8080
      requestType: http
      runtimeType: customize
      cloudBuildType: Dockerfile
      functionName: "{{ functionName }}"
      code: flowise
      environmentVariables:
        testkey: testvalue
      logConfig:
        isOpen: true
      scale:
        scale_config: 1
        min: 1
        max: 300
      triggers:
        - triggerName: httptrigger
          triggerType: http
          disableURLInternet: true
          funcVersion: LATEST
          triggerConfig: '{"auth_type":"None","methods":["GET","POST","PUT","DELETE","OPTIONS","HEAD","PATCH"],"disable_url_internet":true,"auth_config":""}'
