edition: 3.0.0
name: fc-zyun-node-sample
access: "{{ access }}"
vars:
  region: "{{ region }}"
resources:
  framework:
    component: fc
    props:
      region: "{{ region }}"
      description: "{{ description }}"
      runtime: "{{ runtime }}"
      memorySize: 512
      cpu: 0.05
      diskSize: 512
      timeout: 100
      instanceConcurrency: 1
      port: 8080
      requestType: event
      runtimeType: built-in
      cloudBuildType: Source
      functionName: "{{ functionName }}"
      code: fc-zyun-node
      environmentVariables:
        testkey: testvalue
      logConfig:
        isOpen: false
      scale:
        scale_config: 1
        min: 1
        max: 300
